name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest mkdocs

      - name: Lint with ruff
        run: ruff check sdk/ adapters/ console/

      - name: Type check with mypy
        run: mypy sdk/ --ignore-missing-imports || true

      - name: Run SDK tests
        run: |
          cd sdk && python -m pytest test_a2a_adapter.py -v
          python -m pytest test_field_roundtrip.py -v

      - name: Build docs
        run: mkdocs build -f docs/mkdocs.yml || true

  deploy-docs:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
